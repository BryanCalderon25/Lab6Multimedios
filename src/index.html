<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>To-Do App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="app">
    <h1 class="titulo">Lista de tareas</h1>

    <div class="formulario">
      <input type="text" id="txtTarea" placeholder="Digite una tarea">
      <button id="btnAgregar">Agregar</button>
    </div>

    <p id="mensaje"></p>

    <p class="contador">
      Pendientes: <span id="contador">0</span>
    </p>

    <ul id="lista"></ul>
  </div>

  <script type="module" src="./main.js"></script>

</body>
</html>
